<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PoE2 Crafting DB — 0.5</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080c14;color:#e2e8f0;font-family:'Space Mono',monospace;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:#080c14}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}

/* TOPBAR */
#top{height:50px;background:linear-gradient(90deg,#0f1923,#0d1520);border-bottom:1px solid #1e3a5f;display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;z-index:200;position:relative}
#mbtn{width:34px;height:34px;background:#0f1923;border:1px solid #1e3a5f;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;transition:all .2s;user-select:none}
#mbtn.on{background:#f59e0b22;border-color:#f59e0b66;color:#f59e0b}
#logo{width:26px;height:26px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 10px #f59e0b44;flex-shrink:0}
.tname{line-height:1.2;flex-shrink:0}.tname .t1{font-size:11px;font-weight:700;color:#f59e0b;letter-spacing:2px;text-transform:uppercase}.tname .t2{font-size:8px;color:#334155;letter-spacing:1px}
#sbox{flex:1;background:#0f1923;border:1px solid #1e3a5f;border-radius:6px;display:flex;align-items:center;padding:0 8px;gap:6px;height:30px;min-width:0}
#sbox span{color:#334155;font-size:12px;flex-shrink:0}
#sbox input{background:none;border:none;outline:none;color:#94a3b8;font-size:11px;width:100%;font-family:inherit;min-width:0}
#cnt{font-size:9px;color:#334155;flex-shrink:0;white-space:nowrap}

/* CATS */
#cats{height:36px;background:#0a1018;border-bottom:1px solid #0f1f35;display:flex;align-items:center;padding:0 8px;gap:3px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
#cats::-webkit-scrollbar{height:2px}
.cb{padding:3px 9px;border-radius:4px;border:1px solid #1e3a5f;background:transparent;color:#475569;cursor:pointer;font-size:9px;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:3px;transition:all .15s;user-select:none}
.cb.on{background:#f59e0b14;border-color:#f59e0b44;color:#f59e0b;font-weight:700}

/* LAYOUT */
#main{display:flex;height:calc(100dvh - 86px);position:relative;overflow:hidden}
#ovl{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:90;transition:opacity .28s}
#ovl.show{opacity:.55;pointer-events:all}

/* SIDEBAR */
#sb{position:absolute;left:0;top:0;bottom:0;width:290px;background:#090d16;border-right:1px solid #0f1f35;overflow-y:auto;z-index:100;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);-webkit-overflow-scrolling:touch}
#sb.open{transform:translateX(0)}
@media(min-width:768px){
  #sb{position:relative;transform:translateX(0)!important;width:270px;min-width:270px;flex-shrink:0;transition:width .28s cubic-bezier(.4,0,.2,1)}
  #sb.col{width:0;min-width:0;border-right:none;overflow:hidden}
  #ovl{display:none!important}
}

.ri{padding:10px 13px;border-bottom:1px solid #0c1824;cursor:pointer;border-left:3px solid transparent;transition:background .1s}
.ri.on{background:#0d1e30;border-left-color:var(--sc)}
.ri:active{background:#0a1422}
.br{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.sb2{border-radius:3px;padding:1px 5px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.vt{font-size:8px;color:#334155}.nt{background:#7f1d1d;color:#fca5a5;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700}
.rg{font-size:10px;color:#94a3b8;line-height:1.4}.ri.on .rg{color:#f1f5f9;font-weight:600}
.rb{font-size:8px;color:#f59e0b;margin-top:2px}
#nr{padding:20px;color:#334155;font-size:11px;text-align:center}

/* DETAIL */
#det{flex:1;overflow-y:auto;background:#080c14;-webkit-overflow-scrolling:touch;min-width:0}
#di{padding:18px 14px 50px}
@media(min-width:768px){#di{padding:22px 22px 60px}}
#es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#1e3a5f;padding:40px}
#es .ei{font-size:36px;margin-bottom:10px;opacity:.3}
#es .et{font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center}

/* DETAIL CONTENT */
.db2{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.dsb{border-radius:5px;padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid transparent}
.dfb{border-radius:4px;padding:2px 8px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid transparent;margin-left:auto}
.dab,.dvb{background:#0f1923;border:1px solid #1e3a5f;border-radius:4px;padding:2px 8px;font-size:8px;color:#64748b}
.dnb{background:#7f1d1d;border:1px solid #b91c1c;border-radius:4px;padding:3px 8px;font-size:8px;font-weight:700;color:#fca5a5}
.dg{font-size:15px;font-weight:700;color:#f8fafc;line-height:1.4;margin-bottom:4px}
@media(min-width:768px){.dg{font-size:17px}}
.dp{font-size:10px;color:#f59e0b}

.sl{font-size:8px;font-weight:700;color:#334155;letter-spacing:2px;text-transform:uppercase;margin:14px 0 7px;display:flex;align-items:center;gap:7px}
.sl::before,.sl::after{content:'';flex:1;height:1px;background:#0f1f35}

/* STEPS */
.sl2{display:flex;flex-direction:column;gap:3px}
.si{border-radius:5px;border:1px solid #0f1f35;background:#0a1018;overflow:hidden}
.si.op{border-color:#1e3a5f;background:#0d1e30}
.si.nx{opacity:.45}
.sh{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;user-select:none}
.sn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;background:#0f1f35;border:1px solid #1e3a5f;color:#334155;transition:all .15s}
.si.op .sn{background:#f59e0b14;border-color:#f59e0b;color:#f59e0b}
.si.nx .sn{background:#7f1d1d;border-color:#b91c1c;color:#fca5a5}
.sa{flex:1;font-size:11px;color:#94a3b8;line-height:1.4}
.si.op .sa{color:#f8fafc;font-weight:600}
.si.nx .sa{text-decoration:line-through;color:#6b2020}
.st{color:#334155;font-size:9px;flex-shrink:0}
.sd{padding:3px 11px 10px 42px;font-size:10px;color:#64748b;line-height:1.7;border-top:1px solid #0f1f35}

/* TARGETS */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:420px){.tg{grid-template-columns:1fr}}
.tc{background:#0a1018;border:1px solid #0f1f35;border-radius:7px;padding:10px}
.tl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:inline-block;border-radius:3px;padding:2px 7px}
.ti{font-size:10px;margin-bottom:3px;display:flex;gap:5px;align-items:flex-start;line-height:1.5}

.cs{background:#0a1018;border:1px solid #0f1f35;border-radius:7px;padding:10px;margin-top:4px}
.ch{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.ck{background:#0f1923;border:1px solid #1e3a5f;border-radius:4px;padding:2px 7px;font-size:9px;color:#64748b}

.tr{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px}
.tg2{background:#0c1824;border:1px solid #0f2030;border-radius:9px;padding:2px 7px;font-size:8px;color:#334155;cursor:pointer}
.tg2:active{color:#64748b}
</style>
</head>

Omen of Abyssal Echoes (~1.2 div \u2014 optional)"],"must_have":["+2 to All Spell Skills","T3 Crit Hit Chance (essence)"],"want":["Cast Speed (desecrate)","Spell Damage or Flat ES (prefix)","ES Rune upgraded to Perfect"]},{"id":"jewel_002","slot":"Timeless Jewel","version":"0.5","goal":"Timeless Jewel \u2014 Double Crit (Damage+Chance) + ES from Focus + Very Large radius","difficulty":"high \u2014 repetitive desecrate loop until both crits land","budget":"Medium-High \u2014 can be very expensive if unlucky on crit cycling","author":"","nerfed":false,"tags":["timeless jewel","jewel","crit","energy shield","focus","very large","caster","oracle","version-0.5"],"steps":[{"step":"1","action":"Find Timeless Jewel base with 25% ES from Focus + 1 crit mod","details":"Search trade for Timeless Jewel with max roll (25%) ES from Focus. Ideally already has Crit Damage or Spell Crit Damage. 2 mods only for best fracture odds."},{"step":"2","action":"Regal Orb to add 3rd mod","details":"Add any 3rd mod \u2014 doesn't matter what tier or type"},{"step":"3","action":"Cranium \u2192 Desecrate SUFFIX","details":"Desecrate a suffix slot to hunt 2nd crit mod"},{"step":"4","action":"Well of Souls \u2192 Reveal \u2014 hunt Crit Damage or Spell Crit Damage","details":"Both Crit Damage and Crit Chance are acceptable. Use Abyssal Echoes if the base is already strong."},{"step":"5","action":"Exalt slam remaining slot","details":"Fill the last open mod. Pray for something useful, NOT 'upgrades to medium' or 'upgrades to large' (these brick the Very Large mod)."},{"step":"6","action":"Ancient Medallion / Licking Melancholy \u2192 adds Very Large radius","details":"50/50: removes a PREFIX and adds 'upgrades to Very Large'. If it removes your ES from Focus = bricked. Fracture ES from Focus first to guarantee safety."},{"step":"7","action":"Divine Orb \u2014 maximize crit rolls","details":"Divine both crit mods toward 10%/10% (max). Can be expensive to reach max but significant value increase."}],"currency":["Timeless Jewel base with 25% ES from Focus (~2 div)","Regal Orb","Cranium (multiple \u2014 desecrate loop, ~22 ex each)","Orb of Annulment (reset bad suffix)","Omen of Abyssal Echoes (optional)","Exalted Orb (fill last slot)","Omen of Sinistral Annulment (conditional \u2014 save base from br","Ancient Medallion / Licking Melancholy (Very Large)","Fracturing Orb (recommended before Medallion \u2014 safety)","Divine Orb (polish crit rolls)"],"must_have":["Crit Damage Bonus","Spell Crit Damage (or Crit Chance)","ES from Focus (25% max)"],"want":["Very Large radius (from Medallion)","10%/10% crit rolls (divined)"]},{"id":"wand_003","slot":"Wand","version":"0.5","goal":"+7 Physical Spell Skills wand \u2014 Fractured +5 + Celestial Alloy (+1) + Asenath's Rune (+1) + Cast Speed + Crit Dmg","difficulty":"high \u2014 fracture RNG, mana avoidance, expensive materials","budget":"~25-30 div","author":"","nerfed":false,"tags":["wand","+7 skills","physical spell","fractured","transcendent alloy","celestial alloy","astrid creativity","cast speed","crit","high-end","version-0.5"],"steps":[{"step":"1","action":"Find Rare wand with +5 Physical Spell Skills + 2 empty suffix slots","details":"Search trade: Rare wand, stat '+5 to Level of All Physical Spell Skills', empty suffix modifiers = 2. Cost ~20 ex. Buy several \u2014 you'll likely need multiple fracture attempts."},{"step":"2","action":"Dextral Necromancy + Preserved Jawbone \u2192 Desecrate SUFFIX","details":"Add a desecrated suffix as the 4th modifier. This makes it a 1/3 fracture instead of 1/4 \u2014 desecrated mods cannot be fractured."},{"step":"3","action":"Fracturing Orb \u2192 fracture +5 Physical Spell Skills (1/3 chance)","details":"With 3 fracturable mods + 1 desecrated (can't fracture), it's a 1/3 chance to hit the +5. On miss: discard wand, start over. On hit: proceed."},{"step":"4","action":"Annul everything except +5 Physical Spell Skills (fractured) + desecrated suffix","details":"Strip all other mods with Orb of Annulment until only the fractured +5 and desecrated suffix remain."},{"step":"5","action":"Add Quality + Socket","details":"Quality the wand before adding socket. Add socket for Astrid's Creativity Rune (step 9)."},{"step":"6","action":"Exalt slam a random prefix (any)","details":"Transcendent Alloy needs something to remove. Add any prefix first."},{"step":"7","action":"Transcendent Alloy \u2192 Cast Speed + Damage as Extra Cold (1st crafted mod)","details":"Removes the random prefix we just added \u2192 adds Cast Speed + Damage as Extra Cold as a crafted suffix."},{"step":"8","action":"Dextral Necromancy + Preserved Jawbone \u2192 Desecrate SUFFIX (again)","details":"Add another desecrated suffix. The first desecrated suffix was for the fracture \u2014 this is for the crit damage reveal at the end."},{"step":"9","action":"Omen of Greater Exaltation + Greater Exalted Orb \u2192 fill 2 prefixes","details":"Fills 2 random prefixes at once. Hope for Damage as Extra (Fire/Lightning/Cold) or Spell Damage. Avoid Mana."},{"step":"10","action":"Single Exalt slam \u2192 fill 3rd prefix (must have ALL 3 prefixes filled)","details":"ALL 3 prefixes must be filled before Celestial Alloy. If you hit Mana again \u2192 use Sinistral Annulment to remove it and re-exalt."},{"step":"TROUBLESHOOTING \u2014 Ma","action":"If Mana prefix on item: Omen of Sinistral Annulment + Orb of Annulment \u2192 remove it \u2192 re-exalt","details":"Celestial Alloy CANNOT be added if Mana prefix exists. Sinistral Annulment guarantees removing a prefix. Cost ~3.5 div per attempt. Alternative: Omen of Whittling + Sinistral Erasure to target Mana if it's the lowest ilvl mod."},{"step":"11","action":"Insert Astrid's Creativity Rune into socket (~14 div)","details":"Enables 2nd crafted modifier slot. Required before Celestial Alloy."}],"currency":["Rare wand +5 Physical Spell Skills + 2 empty suffixes (~20 e","Fracturing Orb (~120 ex \u00d7 ~5 average attempts)","Orb of Annulment (strip after fracture)","Omen of Dextral Necromancy (\u00d72)","Preserved Jawbone (\u00d72)","Transcendent Alloy (~2 div)","Omen of Greater Exaltation","Greater Exalted Orb (\u00d73)","Omen of Sinistral Annulment (~3.5 div each \u2014 for mana remova","Astrid's Creativity Rune (~14 div)","Celestial Alloy","Omen of Abyssal Echoes (~120-130 ex)"],"must_have":["+5 to All Physical Spell Skills (fractured)","Cast Speed + Damage as Extra Cold (Transcendent Alloy)","+1 to All Spell Skills (Celestial Alloy \u2014 2nd crafted mod)","+1 to All Spell Skills (Asenath's Rune of Wisdom)"],"want":["Critical Spell Damage Bonus (desecrate reveal)","Spell Damage prefix","Damage as Extra Fire/Lightning (from exalt slams)"]},{"id":"helmet_003","slot":"Helmet","version":"0.5","goal":"Armour Helmet \u2014 Life + Flat Armour + % Increased Armour + Armour applies to Elemental Damage + Chaos Res","difficulty":"medium","budget":"Medium \u2014 ilvl 82 base for T1 mods","author":"","nerfed":false,"tags":["helmet","armour","life","armour applies to elemental","chaos resistance","str","paragon greathelm","ilvl 82","version-0.5"],"steps":[{"step":"1","action":"Find Magic Str Helmet base ilvl 82 with Life or Armour prefix","details":"Any armour helmet base ilvl 82+. Look for Life or Armour prefix already on it. Base type is flexible \u2014 the key stat is ilvl 82, not the specific base."},{"step":"2","action":"Greater Essence of the Body OR Essence of Armour","details":"Essence of the Body \u2192 guarantees Maximum Life prefix (T3 tier). OR use Armour essence for guaranteed % Armour. Choose based on which prefix you already have on the base."},{"step":"3","action":"Preserved Rib + Sinistral Necromancy \u2192 Desecrate PREFIX","details":"Forces desecrate onto prefix slot. Hunt for: flat Armour, % Armour, or Life (whichever you're still missing)."},{"step":"4","action":"Well of Souls \u2014 Reveal desecrated prefix","details":""},{"step":"5","action":"Exalt slam suffixes","details":"Target suffixes: Armour applies to Elemental Damage (T1 = 38-43%) + Chaos Resistance. Use Omen of Greater Exaltation + Perfect Exalt for best odds."},{"step":"6","action":"Preserved Collarbone / Rib \u2192 Desecrate SUFFIX (if slot open)","details":"Desecrate remaining suffix slot. Hunt for Chaos Resistance or additional resistance."},{"step":"7","action":"Quality + Socket + Armour Rune","details":"Max quality. Add socket. Insert Greater Iron Rune (physical) or appropriate Armour rune for DPS/defence boost."}],"currency":["Magic Str Helmet base ilvl 82 (Paragon Greathelm or similar)","Greater Essence of the Body OR Armour Essence","Omen of Sinistral Necromancy","Preserved Rib","Omen of Greater Exaltation","Perfect Exalted Orb","Preserved Collarbone (conditional \u2014 suffix desecrate)","Omen of Abyssal Echoes (optional)","Omen of Light (conditional)","Quality Scraps","Artificer's Orb (socket)","Greater Iron / Armour Rune"],"must_have":["T1 Maximum Life (150-174)","T1 % Increased Armour (92-100%)","T1 Armour applies to Elemental Damage (38-43%)"],"want":["T1/T2 Flat Armour","Chaos Resistance (T3+)"]}];
const SC={"Gloves":"#7c3aed","Boots":"#2563eb","Belt":"#d97706","Ring":"#059669","Body Armour":"#dc2626","Bow":"#ea580c","Bow / Spear":"#ea580c","Quarter Staff":"#7c3aed","Wand":"#0891b2","Crossbow / 2H Mace":"#ca8a04","Quiver":"#16a34a","Amulet":"#be123c","Helmet":"#4f46e5","Weapon (Any)":"#ca8a04","Armour (General)":"#475569","Any Armour":"#475569","Talisman (Weapon)":"#92400e","Spear":"#b45309","Jewel":"#0d9488","Crossbow":"#ca8a04","Loreweave":"#7c3aed","Focus":"#0891b2","Timeless Jewel":"#0d9488"};
const SI={"Gloves":"🧤","Boots":"👢","Belt":"🔗","Ring":"💍","Body Armour":"🛡️","Bow":"🏹","Bow / Spear":"🏹","Quarter Staff":"⚔️","Wand":"🪄","Crossbow / 2H Mace":"🔫","Quiver":"🪬","Amulet":"📿","Helmet":"⛑️","Weapon (Any)":"⚔️","Armour (General)":"🛡️","Any Armour":"🛡️","Talisman (Weapon)":"🏺","Spear":"⚔️","Jewel":"💎","Crossbow":"🔫","Loreweave":"🌀","Focus":"🔮","Timeless Jewel":"✨"};
const DC={"low":"#22c55e","low-medium":"#86efac","medium":"#facc15","medium-high":"#f97316","high":"#ef4444","extreme":"#dc2626"};
const gc=s=>{const k=Object.keys(SC).find(k=>s.includes(k));return SC[k]||"#64748b"};
const gi=s=>{const k=Object.keys(SI).find(k=>s.includes(k));return SI[k]||"⚙️"};
const gd=d=>{if(!d)return"#64748b";const k=Object.keys(DC).find(x=>d.toLowerCase().startsWith(x));return DC[k]||"#64748b"};
const CATS={all:()=>true,armour:r=>["Gloves","Boots","Belt","Body Armour","Helmet","Armour","Any Armour"].some(s=>r.slot.includes(s.split(" ")[0])),weapons:r=>["Bow","Spear","Quarter","Wand","Crossbow","Mace","Weapon","Talisman","Loreweave","Focus"].some(s=>r.slot.includes(s)),jewelry:r=>["Ring","Amulet","Quiver","Belt","Jewel"].some(s=>r.slot.includes(s)),profit:r=>r.tags&&(r.tags.includes("profit")||r.tags.includes("flip")),budget:r=>r.tags&&r.tags.includes("budget"),bis:r=>r.tags&&(r.tags.includes("BIS")||r.tags.includes("bis")||r.tags.includes("mirror tier")),nerfed:r=>r.nerfed};
let cat="all",sel=null,ostep=null,sbOpen=false;
const mob=()=>window.innerWidth<768;
function toggleSB(){sbOpen?closeSB():openSB()}
function openSB(){sbOpen=true;document.getElementById("sb").classList.add("open");document.getElementById("ovl").classList.add("show");document.getElementById("mbtn").classList.add("on");if(!mob())document.getElementById("sb").classList.remove("col")}
function closeSB(){if(mob()){sbOpen=false;document.getElementById("sb").classList.remove("open");document.getElementById("ovl").classList.remove("show");document.getElementById("mbtn").classList.remove("on")}else{sbOpen=false;document.getElementById("sb").classList.add("col");document.getElementById("mbtn").classList.remove("on")}}
function setCat(b){document.querySelectorAll(".cb").forEach(x=>x.classList.remove("on"));b.classList.add("on");cat=b.dataset.c;renderSB()}
function fil(){sel=null;ostep=null;renderSB();renderDet()}
function getF(){const q=document.getElementById("si").value.toLowerCase().trim();return DB.filter(r=>{if(!(CATS[cat]?.(r)??true))return false;if(!q)return true;return r.slot.toLowerCase().includes(q)||r.goal.toLowerCase().includes(q)||r.id.toLowerCase().includes(q)||(r.tags&&r.tags.some(t=>t.toLowerCase().includes(q)))||(r.author&&r.author.toLowerCase().includes(q));})}
function renderSB(){const f=getF();const el=document.getElementById("sb");document.getElementById("cnt").textContent=f.length+"/"+DB.length;if(!f.length){el.innerHTML=`<div id="nr">No recipes found</div>`;return}el.innerHTML=f.map(r=>{const c=gc(r.slot);return`<div class="ri${r.id===sel?" on":""}" style="--sc:${c}" onclick="selR('${r.id}')"><div class="br"><span class="sb2" style="background:${c}22;color:${c}">${gi(r.slot)} ${r.slot}</span>${r.nerfed?'<span class="nt">NERFED</span>':''}<span class="vt">v${r.version}</span></div><div class="rg">${r.goal}</div>${r.budget?`<div class="rb">💰 ${r.budget}</div>`:''}</div>`}).join('')}
function selR(id){sel=id;ostep=null;document.querySelectorAll(".ri").forEach(el=>el.classList.toggle("on",el.getAttribute("onclick")===`selR('${id}')`));renderDet();if(mob())closeSB()}
function ts(i){ostep=ostep===i?null:i;renderDet()}
function tgs(t){document.getElementById("si").value=t;fil()}
function renderDet(){const el=document.getElementById("det");if(!sel){el.innerHTML=`<div id="es"><div class="ei">⚗️</div><div class="et">Tap ☰ to browse recipes</div></div>`;return}const r=DB.find(x=>x.id===sel);if(!r)return;const c=gc(r.slot),dc=gd(r.difficulty);
let h=`<div id="di"><div class="db2"><div class="dsb" style="background:${c}22;color:${c};border-color:${c}44">${gi(r.slot)} ${r.slot}</div>${r.nerfed?'<div class="dnb">⚠️ NERFED</div>':''}${r.author?`<div class="dab">by ${r.author}</div>`:''}<div class="dvb">v${r.version}</div><div class="dfb" style="background:${dc}22;color:${dc};border-color:${dc}33">${r.difficulty||'—'}</div></div><div class="dg">${r.goal}</div>${r.budget?`<div class="dp">💰 ${r.budget}</div>`:''}`;
if(r.steps&&r.steps.length){h+=`<div class="sl">Steps</div><div class="sl2">`;r.steps.forEach((s,i)=>{const nx=String(s.step).includes("NERFED")||s.action.includes("NERFED")||s.action.includes("~~");const op=ostep===i;h+=`<div class="si${nx?' nx':''}${op?' op':''}"><div class="sh" onclick="ts(${i})"><div class="sn">${nx?'✕':String(s.step).length<=3?s.step:'→'}</div><div class="sa">${s.action}</div><div class="st">${op?'▲':'▼'}</div></div>${op&&s.details?`<div class="sd">${s.details}</div>`:''}</div>`});h+=`</div>`}
const mh=r.must_have||[],wt=r.want||[];
if(mh.length||wt.length){h+=`<div class="sl">Targets</div><div class="tg">`;if(mh.length){h+=`<div class="tc"><div class="tl" style="background:#fef3c722;color:#fbbf24">✦ Must Have</div>`;mh.forEach(m=>h+=`<div class="ti" style="color:#fef3c7"><span style="color:#f59e0b">›</span>${m}</div>`);h+=`</div>`}if(wt.length){h+=`<div class="tc"><div class="tl" style="background:#bbf7d022;color:#34d399">◎ Want</div>`;wt.forEach(m=>h+=`<div class="ti" style="color:#bbf7d0"><span style="color:#34d399">›</span>${m}</div>`);h+=`</div>`}h+=`</div>`}
if(r.currency&&r.currency.length){h+=`<div class="cs"><div class="sl" style="margin:0 0 0">⚙ Currency</div><div class="ch">`;r.currency.forEach(c2=>h+=`<span class="ck">${c2}</span>`);h+=`</div></div>`}
if(r.tags&&r.tags.length){h+=`<div class="tr">`;r.tags.forEach(t=>h+=`<span class="tg2" onclick="tgs('${t}')">#${t}</span>`);h+=`</div>`}
h+=`</div>`;el.innerHTML=h;el.scrollTop=0}
window.addEventListener("DOMContentLoaded",()=>{renderSB();renderDet();if(!mob())openSB()});
window.addEventListener("resize",()=>{if(!mob()&&sbOpen){document.getElementById("sb").classList.remove("col","open");document.getElementById("ovl").classList.remove("show")}});
</script>
</body>
</html>
